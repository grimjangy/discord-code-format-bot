<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoFormat IDE</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: #181b21;
        --field: #0d0f13;
        --text: #f2f4f8;
        --muted: #9ba5b4;
        --line: #303641;
        --accent: #4cc38a;
        --accent-strong: #74d6ff;
        --danger: #ff7171;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 100vh;
      }

      .toolbar {
        align-items: center;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        display: grid;
        gap: 9px;
        grid-template-columns: auto minmax(120px, 150px) minmax(150px, 1fr) minmax(110px, 150px) repeat(4, auto);
        min-height: 58px;
        padding: 10px 12px;
      }

      .brand {
        font-size: 15px;
        font-weight: 800;
        white-space: nowrap;
      }

      select,
      input,
      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        height: 36px;
      }

      select,
      input {
        background: var(--field);
        min-width: 0;
        padding: 0 10px;
      }

      button {
        background: #222833;
        cursor: pointer;
        padding: 0 12px;
        white-space: nowrap;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #04110a;
        font-weight: 800;
      }

      button.send {
        border-color: var(--accent-strong);
        color: var(--accent-strong);
      }

      button:disabled {
        cursor: progress;
        opacity: 0.6;
      }

      #editor {
        min-height: 0;
      }

      .status {
        align-items: center;
        background: var(--panel);
        border-top: 1px solid var(--line);
        color: var(--muted);
        display: flex;
        font-size: 13px;
        gap: 8px;
        min-height: 34px;
        padding: 7px 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .status a {
        color: var(--accent-strong);
      }

      @media (max-width: 980px) {
        .toolbar {
          grid-template-columns: 1fr 1fr;
        }

        .brand {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 560px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div class="brand">AutoFormat IDE</div>
        <select id="language"></select>
        <input id="channelId" inputmode="numeric" placeholder="Discord channel ID" />
        <input id="sendSecret" type="password" placeholder="Send secret" />
        <button class="primary" id="formatButton">Format</button>
        <button id="suggestButton">Suggest</button>
        <button class="send" id="sendButton">Send</button>
        <button id="copyButton">Copy</button>
      </header>
      <section id="editor"></section>
      <footer class="status" id="status">Ready</footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
      const statusElement = document.querySelector('#status');
      const languageSelect = document.querySelector('#language');
      const channelIdInput = document.querySelector('#channelId');
      const sendSecretInput = document.querySelector('#sendSecret');
      const formatButton = document.querySelector('#formatButton');
      const suggestButton = document.querySelector('#suggestButton');
      const sendButton = document.querySelector('#sendButton');
      const copyButton = document.querySelector('#copyButton');

            ['html5', '<!doctype html>\n<html lang="${1:ko}">\n  <head>\n    <meta charset="utf-8" />\n    <meta name="viewport" content="width=device-width, initial-scale=1" />\n    <title>${2:Document}</title>\n  </head>\n  <body>\n    ${0}\n  </body>\n</html>'],

          words: [

            ['class', 'public class ${1:Name}\n{\n    ${0}\n}'],

      function setStatus(message, isError = false, linkUrl = '') {
        statusElement.classList.toggle('error', isError);
        statusElement.textContent = '';
        statusElement.append(document.createTextNode(message));

        if (linkUrl) {
          const link = document.createElement('a');
          link.href = linkUrl;
          link.target = '_blank';
          link.rel = 'noreferrer';
          link.textContent = 'Open message';
          statusElement.append(document.createTextNode(' '));
          statusElement.append(link);
        }
      }

      async function requestJson(url, body) {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        return data;
      }

      function selectedLanguage() {
        return languages.find((language) => language.value === languageSelect.value);
      }

      async function loadLanguages() {
        const response = await fetch('/api/languages');
        const data = await response.json();
        languages = data.languages;
        languageSelect.innerHTML = languages
          .map((language) => `<option value="${language.value}">${language.name}</option>`)
          .join('');
      }

      function completionItemsFor(languageValue) {
        const data = completionData[languageValue] || { words: [], snippets: [] };
        const wordItems = data.words.map((word) => ({
          label: word,
          kind: monaco.languages.CompletionItemKind.Keyword,
          insertText: word
        }));
        const snippetItems = data.snippets.map(([label, insertText]) => ({
          label,
          kind: monaco.languages.CompletionItemKind.Snippet,
          insertText,
          insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
        }));

        return [...snippetItems, ...wordItems];
      }

      function registerCompletionProviders() {
        completionProviderDisposables.forEach((disposable) => disposable.dispose());
        completionProviderDisposables = languages.map((language) =>
          monaco.languages.registerCompletionItemProvider(language.editorLanguage, {
            triggerCharacters: ['.', ':', '<', '#', '@', '$'],
            provideCompletionItems() {
              return {
                suggestions: completionItemsFor(language.value)
              };
            }
          })
        );
      }

      async function formatCode() {
        formatButton.disabled = true;
        setStatus('Formatting...');

        try {
          const data = await requestJson('/api/format', {
            language: languageSelect.value,
            code: editor.getValue()
          });
          editor.setValue(data.code);
          setStatus('Formatted');
          return data.code;
        } catch (error) {
          setStatus(error.message, true);
          return null;
        } finally {
          formatButton.disabled = false;
        }
      }

      function triggerSuggest() {
        editor.focus();
        editor.trigger('dictionary', 'editor.action.triggerSuggest', {});
        setStatus('Suggestions opened');
      }

      async function sendToDiscord() {
        const channelId = channelIdInput.value.trim();

        if (!channelId) {
          setStatus('Discord channel ID를 입력해주세요.', true);
          return;
        }

        sendButton.disabled = true;
        setStatus('Sending...');

        try {
          const data = await requestJson('/api/discord/send', {
            language: languageSelect.value,
            channelId,
            secret: sendSecretInput.value,
            code: editor.getValue(),
            format: true
          });
          localStorage.setItem('autoformat.channelId', channelId);
          localStorage.setItem('autoformat.sendSecret', sendSecretInput.value);
          setStatus('Sent to Discord', false, data.messageUrl);
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          sendButton.disabled = false;
        }
      }

      async function copyCode() {
        await navigator.clipboard.writeText(editor.getValue());
        setStatus('Copied');
      }

      async function loadSharedCodeIfNeeded() {
        const match = window.location.pathname.match(/^\/s\/([^/]+)$/);

        if (!match) {
          return false;
        }

        const response = await fetch(`/api/share/${match[1]}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '공유 코드를 열 수 없습니다.');
        }

        languageSelect.value = data.language;
        monaco.editor.setModelLanguage(editor.getModel(), selectedLanguage().editorLanguage);
        editor.setValue(data.code);
        return true;
      }

      require.config({
        paths: {
          vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
        }
      });

      require(['vs/editor/editor.main'], async () => {
        await loadLanguages();
        registerCompletionProviders();

        channelIdInput.value = localStorage.getItem('autoformat.channelId') || '';
        sendSecretInput.value = localStorage.getItem('autoformat.sendSecret') || '';

        editor = monaco.editor.create(document.querySelector('#editor'), {
          automaticLayout: true,
          fontSize: 14,
          language: selectedLanguage().editorLanguage,
          minimap: { enabled: false },
          quickSuggestions: true,
          snippetSuggestions: 'top',
          suggestOnTriggerCharacters: true,
          tabCompletion: 'on',
          theme: 'vs-dark',
          value: 'if(true){\nconsole.log("hello")\n}\n',
          wordBasedSuggestions: 'allDocuments',
          wordWrap: 'on',
          wrappingIndent: 'same'
        });

        try {
          const loadedShare = await loadSharedCodeIfNeeded();

          if (loadedShare) {
            setStatus('Shared code opened');
          }
        } catch (error) {
          setStatus(error.message, true);
        }

        languageSelect.addEventListener('change', () => {
          monaco.editor.setModelLanguage(editor.getModel(), selectedLanguage().editorLanguage);
          triggerSuggest();
        });

        formatButton.addEventListener('click', formatCode);
        suggestButton.addEventListener('click', triggerSuggest);
        sendButton.addEventListener('click', sendToDiscord);
        copyButton.addEventListener('click', copyCode);
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, formatCode);
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Space, triggerSuggest);
      });
    </script>
  </body>
</html>
