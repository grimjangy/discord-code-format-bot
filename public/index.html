<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoFormat IDE</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #111318;
        --panel: #191c23;
        --text: #edf0f7;
        --muted: #9aa3b2;
        --line: #2a2f3a;
        --accent: #55c2ff;
        --danger: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 100vh;
      }

      .toolbar {
        align-items: center;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 10px;
        min-height: 56px;
        padding: 10px 14px;
      }

      .brand {
        font-size: 15px;
        font-weight: 700;
        margin-right: 8px;
        white-space: nowrap;
      }

      select,
      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        height: 36px;
      }

      select {
        background: #101219;
        min-width: 150px;
        padding: 0 10px;
      }

      button {
        background: #202532;
        cursor: pointer;
        padding: 0 13px;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #06131c;
        font-weight: 700;
      }

      button:disabled {
        cursor: progress;
        opacity: 0.6;
      }

      #editor {
        min-height: 0;
      }

      .status {
        align-items: center;
        background: var(--panel);
        border-top: 1px solid var(--line);
        color: var(--muted);
        display: flex;
        font-size: 13px;
        min-height: 34px;
        padding: 7px 14px;
      }

      .status.error {
        color: var(--danger);
      }

      @media (max-width: 720px) {
        .toolbar {
          align-items: stretch;
          flex-wrap: wrap;
        }

        .brand {
          width: 100%;
        }

        select,
        button {
          flex: 1 1 140px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div class="brand">AutoFormat IDE</div>
        <select id="language"></select>
        <button class="primary" id="formatButton">Format</button>
        <button id="completeButton">API Complete</button>
      </header>
      <section id="editor"></section>
      <footer class="status" id="status">Ready</footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
      const statusElement = document.querySelector('#status');
      const languageSelect = document.querySelector('#language');
      const formatButton = document.querySelector('#formatButton');
      const completeButton = document.querySelector('#completeButton');
      let editor;
      let languages = [];

      function setStatus(message, isError = false) {
        statusElement.textContent = message;
        statusElement.classList.toggle('error', isError);
      }

      async function requestJson(url, body) {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        return data;
      }

      function selectedLanguage() {
        return languages.find((language) => language.value === languageSelect.value);
      }

      async function loadLanguages() {
        const response = await fetch('/api/languages');
        const data = await response.json();
        languages = data.languages;
        languageSelect.innerHTML = languages
          .map((language) => `<option value="${language.value}">${language.name}</option>`)
          .join('');
      }

      async function formatCode() {
        formatButton.disabled = true;
        setStatus('Formatting...');

        try {
          const data = await requestJson('/api/format', {
            language: languageSelect.value,
            code: editor.getValue()
          });
          editor.setValue(data.code);
          setStatus('Formatted');
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          formatButton.disabled = false;
        }
      }

      async function completeCode() {
        completeButton.disabled = true;
        setStatus('Requesting completion...');

        try {
          const model = editor.getModel();
          const position = editor.getPosition();
          const cursorOffset = model.getOffsetAt(position);
          const data = await requestJson('/api/complete', {
            language: languageSelect.value,
            code: editor.getValue(),
            cursorOffset
          });

          if (!data.completion) {
            setStatus(data.message || 'No completion returned', true);
            return;
          }

          editor.executeEdits('api-complete', [
            {
              range: new monaco.Range(
                position.lineNumber,
                position.column,
                position.lineNumber,
                position.column
              ),
              text: data.completion
            }
          ]);
          setStatus('Completion inserted');
        } catch (error) {
          setStatus(error.message, true);
        } finally {
          completeButton.disabled = false;
        }
      }

      require.config({
        paths: {
          vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
        }
      });

      require(['vs/editor/editor.main'], async () => {
        await loadLanguages();

        editor = monaco.editor.create(document.querySelector('#editor'), {
          automaticLayout: true,
          fontSize: 14,
          language: selectedLanguage().editorLanguage,
          minimap: { enabled: false },
          theme: 'vs-dark',
          value: 'if(true){\\nconsole.log(\"hello\")\\n}\\n'
        });

        languageSelect.addEventListener('change', () => {
          monaco.editor.setModelLanguage(editor.getModel(), selectedLanguage().editorLanguage);
        });

        formatButton.addEventListener('click', formatCode);
        completeButton.addEventListener('click', completeCode);
        editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, formatCode);
      });
    </script>
  </body>
</html>
