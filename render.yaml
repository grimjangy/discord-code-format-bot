services:
  - type: web
    name: discord-code-format-bot
    runtime: docker
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: PUBLIC_IDE_URL
        sync: false
      - key: FORMAT_PRINT_WIDTH
        value: "60"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.2-mini
      - key: COMPLETION_MAX_TOKENS
        value: "160"
